<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Consensus Reality Icon Candidates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0f0b;--text:#d2e4c5;--text-dim:#738567;--teal:#5ebd8e}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);padding:40px}
h2{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;margin-bottom:20px;color:var(--teal)}
.grid{display:flex;gap:32px;flex-wrap:wrap}
.opt{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-dim);font-size:.68rem;font-family:'IBM Plex Mono',monospace}
.opt svg{width:32px;height:32px}
</style>
</head>
<body>
<h2>Consensus Reality — alternates</h2>
<div class="grid">

</html>
