# Narrative Nexus -- Docker Compose
# Docker is an optional deployment convenience for Track 3 (packaging).
# One service: FastAPI app with baked demo DB + SPA frontend.
#
# Quick start:
#   docker compose up
#   docker compose up -d          # detached
#   docker compose down           # stop + remove

services:
  # App: FastAPI + pipeline + frontend (self-sufficient)
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - 8000:8000
    environment:
      - NN_DB_PATH=/data/demo/demo.db
      # Provider API keys -- all optional, app degrades gracefully
      - FIREWORKS_API_KEY
      - FIRECRAWL_API_KEY
      - DEEPSEEK_API_KEY
      - OPENAI_API_KEY
      # Hosting-only guard
      - NN_DISABLE_SCRAPER
